version: '3.8'

services:
  # Base de Datos
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: db_ventas
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Backend de Ventas
  backend-ventas:
    image: monikako/backend-ventas:latest
    container_name: spring-backend-ventas
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/db_ventas
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=admin123
    ports:
      - "8080:8080"
    depends_on:
      - db

  # Backend de Despachos
  backend-despachos:
    image: monikako/backend-despachos:latest
    container_name: spring-backend-despachos
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/db_ventas
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=admin123
    ports:
      - "8081:8080"
    depends_on:
      - db

  # Frontend
  frontend:
    image: monikako/frontend-despacho:latest
    container_name: react-frontend
    user: root
    ports:
      - "80:80"
    depends_on:
      - backend-ventas
      - backend-despachos

volumes:
  db_data: